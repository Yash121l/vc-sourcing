name: vc-sourcing

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=file:/data/local.db
      - WEB_URL=http://localhost:5173
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-api03-REPLACE_WITH_YOUR_KEY}
      - WORKOS_API_KEY=${WORKOS_API_KEY:-sk_test_REPLACE}
      - WORKOS_CLIENT_ID=${WORKOS_CLIENT_ID:-client_REPLACE}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - POSTHOG_KEY=${POSTHOG_KEY:-phc_placeholder}
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - VITE_API_URL=http://localhost:3001
        - VITE_APP_ENV=development
        - VITE_POSTHOG_KEY=${VITE_POSTHOG_KEY:-phc_placeholder_replace_with_real_key}
        - VITE_POSTHOG_HOST=https://us.posthog.com
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
